version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: reconai
      POSTGRES_USER: reconai
      POSTGRES_PASSWORD: reconai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reconai"]
      interval: 5s
      timeout: 5s
      retries: 10

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/reconai
      DB_USER: reconai
      DB_PASS: reconai
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
