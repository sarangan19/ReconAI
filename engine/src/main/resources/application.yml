spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/reconai}
    username: ${DB_USER:reconai}
    password: ${DB_PASS:reconai}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 500
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.reconai: INFO
    org.flywaydb: INFO
